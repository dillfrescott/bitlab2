# fly.toml app configuration file generated for dill-bitlab on 2026-07-05T14:28:10-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dill-bitlab'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_URL = 'https://bitlab.dill.moe'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
